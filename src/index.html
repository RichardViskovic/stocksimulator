<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simple Stock and Investment Simulator</h1>

    <div id="settings">
        <h2>Settings</h2>
        <label>Economy Status:
            <select id="economy">
                <option value="boom">Boom</option>
                <option value="growth" selected>Growth</option>
                <option value="stagnation">Stagnation</option>
                <option value="recession">Recession</option>
                <option value="depression">Depression</option>
            </select>
        </label>
        <label>Inflation (% per tick):
            <input type="number" id="inflation" value="2" step="0.1" min="0">
        </label>
        <label>
            <input type="checkbox" id="randomInflation"> Randomize Inflation
        </label>
    </div>

    <h2>Assets</h2>
    <table id="assetsTable">
        <thead>
            <tr>
                <th>Asset</th>
                <th>Price</th>
                <th>Volatility</th>
            </tr>
        </thead>
        <tbody id="assetsBody">
        </tbody>
    </table>

    <button id="tick">Tick</button>

    <h2>Portfolios</h2>
    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Player</th>
                <th>Gold</th>
                <th>Bank Deposits</th>
                <th>Stagg Securities</th>
                <th>Campbell Consumables</th>
                <th>Anderson Technologies</th>
                <th>Birch Biotech</th>
                <th>Cash</th>
                <th>Net Worth</th>
            </tr>
        </thead>
        <tbody>
            <tr data-player="boys">
                <th>Boys</th>
                <td><input type="number" min="0" value="0" data-asset="Gold"></td>
                <td><input type="number" min="0" value="0" data-asset="Bank Deposits"></td>
                <td><input type="number" min="0" value="0" data-asset="Stagg Securities"></td>
                <td><input type="number" min="0" value="0" data-asset="Campbell Consumables"></td>
                <td><input type="number" min="0" value="0" data-asset="Anderson Technologies"></td>
                <td><input type="number" min="0" value="0" data-asset="Birch Biotech"></td>
                <td class="cash">1000</td>
                <td class="net"></td>
            </tr>
            <tr data-player="girls">
                <th>Girls</th>
                <td><input type="number" min="0" value="0" data-asset="Gold"></td>
                <td><input type="number" min="0" value="0" data-asset="Bank Deposits"></td>
                <td><input type="number" min="0" value="0" data-asset="Stagg Securities"></td>
                <td><input type="number" min="0" value="0" data-asset="Campbell Consumables"></td>
                <td><input type="number" min="0" value="0" data-asset="Anderson Technologies"></td>
                <td><input type="number" min="0" value="0" data-asset="Birch Biotech"></td>
                <td class="cash">1000</td>
                <td class="net"></td>
            </tr>
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
